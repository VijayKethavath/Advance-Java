<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>
</head>
<body>

<center>
<h1>Simple Calculator</h1>
<form action="Calculator">

<label>Enter A value</label>
<input type = "text" name = "Aval"><br><br>

<label>Enter B value</label>
<input type = "text" name = "Bval"><br><br>

<input type = "radio" name = "val" value = "+">+
<input type = "radio" name = "val" value = "-">-
<input type = "radio" name = "val" value = "*">*
<input type = "radio" name = "val" value = "/">/
<input type = "radio" name = "val" value = "%">%
<br><br>

<input type = "submit" name = "check">
</form>
</center>

</body>
</html>
